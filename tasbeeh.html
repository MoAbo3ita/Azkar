<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التسابيح - موقع الأذكار</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">موقع الأذكار</a>
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="themeIcon">🌙</span>
                <span id="themeText">الوضع الداكن</span>
            </button>
        </div>
    </header>

    <nav>
        <div class="nav-content">
            <a href="index.html" class="nav-btn">الرئيسية</a>
            <a href="morning.html" class="nav-btn">أذكار الصباح</a>
            <a href="evening.html" class="nav-btn">أذكار المساء</a>
            <a href="tasbeeh.html" class="nav-btn active">تسابيح</a>
            <a href="rosary.html" class="nav-btn">المسبحة الإلكترونية</a>
        </div>
    </nav>

    <main>
        <h2 class="section-title">التسابيح</h2>
        <div class="tasbeeh-grid" id="tasbeehCards"></div>
    </main>

    <footer>
        <div class="footer-content">
            <p class="footer-text">صلى الله على نبينا محمد ﷺ</p>
            <p class="copyright">© 2026 By Mohamed Hany</p>
        </div>
    </footer>

    <button class="scroll-top" id="scrollTop" onclick="scrollToTop()">↑</button>

    <script src="js/main.js"></script>
    <script>
        // Tasbeeh Data
        const tasbeehData = [
            {
                text: "سُبْحَانَ اللَّهِ",
                count: 100,
                fadl: "يكتب له ألف حسنة أو يحط عنه ألف خطيئة."
            },
            {
                text: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ",
                count: 100,
                fadl: "حُطَّتْ خَطَايَاهُ وَإِنْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ. لَمْ يَأْتِ أَحَدٌ يَوْمَ الْقِيَامَةِ بِأَفْضَلَ مِمَّا جَاءَ بِهِ إِلَّا أَحَدٌ قَالَ مِثْلَ مَا قَالَ أَوْ زَادَ عَلَيْهِ."
            },
            {
                text: "سُبْحَانَ اللَّهِ وَالْحَمْدُ لِلَّهِ",
                count: 100,
                fadl: "تَمْلَآَنِ مَا بَيْنَ السَّمَاوَاتِ وَالْأَرْضِ."
            },
            {
                text: "سُبْحَانَ اللهِ العَظِيمِ وَبِحَمْدِهِ",
                count: 100,
                fadl: "غرست له نخلة في الجنة (أى عدد)."
            },
            {
                text: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ ، سُبْحَانَ اللَّهِ الْعَظِيمِ",
                count: 100,
                fadl: "ثقيلتان في الميزان حبيبتان إلى الرحمن (أى عدد)."
            },
            {
                text: "لَا إلَه إلّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلُّ شَيْءِ قَدِيرِ.",
                count: 100,
                fadl: "كانت له عدل عشر رقاب، وكتبت له مئة حسنة، ومحيت عنه مئة سيئة، وكانت له حرزا من الشيطان."
            },
            {
                text: "الْحَمْدُ للّهِ رَبِّ الْعَالَمِينَ",
                count: 100,
                fadl: "تملأ ميزان العبد بالحسنات."
            },
            {
                text: "لا حَوْلَ وَلا قُوَّةَ إِلا بِاللَّهِ",
                count: 100,
                fadl: "كنز من كنوز الجنة (أى عدد)."
            },
            {
                text: "الْلَّهُم صَلِّ وَسَلِم وَبَارِك عَلَى سَيِّدِنَا مُحَمَّد",
                count: 100,
                fadl: "من صلى على حين يصبح وحين يمسى ادركته شفاعتى يوم القيامة."
            },
            {
                text: "أستغفر الله",
                count: 100,
                fadl: "لفعل الرسول صلى الله عليه وسلم."
            },
            {
                text: "سُبْحَانَ الْلَّهِ، وَالْحَمْدُ لِلَّهِ، وَلَا إِلَهَ إِلَّا الْلَّهُ، وَالْلَّهُ أَكْبَرُ",
                count: 100,
                fadl: "أنهن أحب الكلام الى الله، ومكفرات للذنوب، وغرس الجنة، وجنة لقائلهن من النار، وأحب الى النبي عليه السلام مما طلعت عليه الشمس، والْباقِيَاتُ الصّالِحات."
            },
            {
                text: "لَا إِلَهَ إِلَّا اللَّهُ",
                count: 100,
                fadl: "أفضل الذكر لا إله إلاّ الله."
            },
            {
                text: "الْلَّهُ أَكْبَرُ",
                count: 100,
                fadl: "من قال الله أكبر كتبت له عشرون حسنة وحطت عنه عشرون سيئة. الله أكبر من كل شيء."
            },
            {
                text: "سُبْحَانَ اللَّهِ ، وَالْحَمْدُ لِلَّهِ ، وَلا إِلَهَ إِلا اللَّهُ ، وَاللَّهُ أَكْبَرُ ، اللَّهُمَّ اغْفِرْ لِي ، اللَّهُمَّ ارْحَمْنِي ، اللَّهُمَّ ارْزُقْنِي.",
                count: 100,
                fadl: "خير الدنيا والآخرة"
            },
            {
                text: "الْحَمْدُ لِلَّهِ حَمْدًا كَثِيرًا طَيِّبًا مُبَارَكًا فِيهِ.",
                count: 100,
                fadl: "قَالَ النَّبِيُّ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ \"لَقَدْ رَأَيْتُ اثْنَيْ عَشَرَ مَلَكًا يَبْتَدِرُونَهَا، أَيُّهُمْ يَرْفَعُهَا\"."
            },
            {
                text: "اللَّهُ أَكْبَرُ كَبِيرًا ، وَالْحَمْدُ لِلَّهِ كَثِيرًا ، وَسُبْحَانَ اللَّهِ بُكْرَةً وَأَصِيلاً.",
                count: 100,
                fadl: "قَالَ النَّبِيُّ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ \"عَجِبْتُ لَهَا ، فُتِحَتْ لَهَا أَبْوَابُ السَّمَاءِ\"."
            },
            {
                text: "اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ كَمَا صَلَّيْتَ عَلَى إِبْرَاهِيمَ , وَعَلَى آلِ إِبْرَاهِيمَ إِنَّكَ حَمِيدٌ مَجِيدٌ , اللَّهُمَّ بَارِكْ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ كَمَا بَارَكْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ إِنَّكَ حَمِيدٌ مَجِيدٌ.",
                count: 100,
                fadl: "في كل مره تحط عنه عشر خطايا ويرفع له عشر درجات ويصلي الله عليه عشرا وتعرض على الرسول صلى الله عليه وسلم (أى عدد)."
            }
        ];

        // Render cards
        function renderCards() {
            const container = document.getElementById('tasbeehCards');
            container.innerHTML = tasbeehData.map((item, index) => `
                <div class="zikr-item">
                    <div class="zikr-number">${index + 1}</div>
                    <div class="zikr-card">
                        <div class="zikr-text">${item.text}</div>
                        <div class="zikr-fadl">${item.fadl}</div>
                        <div class="zikr-controls">
                            <span class="count-display" id="count-tasbeeh-${index}">العدد: ${item.count} / ${item.count}</span>
                            <button class="count-btn" id="btn-tasbeeh-${index}" onclick="decrementCount('tasbeeh', ${index}, ${item.count})">
                                اضغط للذكر
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', renderCards);
    </script>
</body>
</html>
